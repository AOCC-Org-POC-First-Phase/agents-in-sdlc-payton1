<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            color: #f1f5f9;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .game-controls {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.secondary {
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.3);
        }

        .btn.secondary:hover {
            box-shadow: 0 6px 20px rgba(100, 116, 139, 0.4);
        }

        .difficulty-select {
            background: #1e293b;
            color: #f1f5f9;
            border: 2px solid #475569;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 16px;
            margin-right: 10px;
        }

        .sudoku-grid {
            display: inline-block;
            background: #1e293b;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            margin-bottom: 30px;
            border: 2px solid #334155;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 2px;
            background: #475569;
            border: 3px solid #475569;
            border-radius: 8px;
        }

        .cell {
            width: 50px;
            height: 50px;
            background: #334155;
            border: 1px solid #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #f1f5f9;
        }

        .cell:hover {
            background: #475569;
        }

        .cell.selected {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
        }

        .cell.given {
            background: #64748b;
            color: #f1f5f9;
            cursor: default;
        }

        .cell.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        /* Thick borders for 3x3 boxes */
        .cell:nth-child(3n) {
            border-right: 3px solid #475569;
        }

        .cell:nth-child(n):nth-child(-n+27) {
            border-bottom: 3px solid #475569;
        }

        .cell:nth-child(n+28):nth-child(-n+54) {
            border-bottom: 3px solid #475569;
        }

        .status-message {
            margin: 20px 0;
            padding: 16px;
            border-radius: 12px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            font-size: 18px;
            font-weight: 500;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-message.success {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .status-message.error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        @media (max-width: 640px) {
            .cell {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }

            h1 {
                font-size: 2rem;
            }

            .game-controls {
                flex-direction: column;
                align-items: center;
            }

            .difficulty-select {
                margin-right: 0;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Sudoku Game</h1>
        
        <div class="game-controls">
            <select id="difficulty" class="difficulty-select">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
            <button id="newGame" class="btn">New Game</button>
            <button id="checkGame" class="btn secondary">Check</button>
            <button id="solveGame" class="btn secondary">Solve</button>
        </div>

        <div class="sudoku-grid">
            <div id="grid" class="grid">
                <!-- Grid cells will be generated by JavaScript -->
            </div>
        </div>

        <div id="statusMessage" class="status-message">
            Click "New Game" to start playing!
        </div>
    </div>

    <script>
        class SudokuUI {
            constructor() {
                this.grid = null;
                this.selectedCell = null;
                this.givenCells = new Set();
                this.initializeUI();
                this.bindEvents();
            }

            initializeUI() {
                this.createGrid();
            }

            createGrid() {
                const gridContainer = document.getElementById('grid');
                gridContainer.innerHTML = '';
                
                for (let i = 0; i < 81; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.index = i;
                    cell.addEventListener('click', () => this.selectCell(i));
                    gridContainer.appendChild(cell);
                }
            }

            bindEvents() {
                document.getElementById('newGame').addEventListener('click', () => this.newGame());
                document.getElementById('checkGame').addEventListener('click', () => this.checkGame());
                document.getElementById('solveGame').addEventListener('click', () => this.solveGame());
                
                document.addEventListener('keydown', (e) => this.handleKeyPress(e));
            }

            selectCell(index) {
                if (this.givenCells.has(index)) return;
                
                // Remove previous selection
                if (this.selectedCell !== null) {
                    document.querySelector(`[data-index="${this.selectedCell}"]`).classList.remove('selected');
                }
                
                // Select new cell
                this.selectedCell = index;
                document.querySelector(`[data-index="${index}"]`).classList.add('selected');
            }

            handleKeyPress(e) {
                if (this.selectedCell === null) return;
                
                const key = e.key;
                if (key >= '1' && key <= '9') {
                    this.setCellValue(this.selectedCell, parseInt(key));
                } else if (key === 'Delete' || key === 'Backspace') {
                    this.setCellValue(this.selectedCell, 0);
                }
            }

            setCellValue(index, value) {
                if (this.givenCells.has(index)) return;
                
                const cell = document.querySelector(`[data-index="${index}"]`);
                cell.textContent = value === 0 ? '' : value;
                cell.classList.remove('error');
                
                // Update grid data
                const row = Math.floor(index / 9);
                const col = index % 9;
                this.grid[row][col] = value;
            }

            async newGame() {
                const difficulty = document.getElementById('difficulty').value;
                
                try {
                    const response = await fetch('/api/new-game', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ difficulty })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        this.grid = data.puzzle;
                        this.displayGrid();
                        this.setMessage(data.message);
                    }
                } catch (error) {
                    this.setMessage('Error creating new game', 'error');
                }
            }

            displayGrid() {
                this.givenCells.clear();
                
                for (let i = 0; i < 81; i++) {
                    const row = Math.floor(i / 9);
                    const col = i % 9;
                    const value = this.grid[row][col];
                    const cell = document.querySelector(`[data-index="${i}"]`);
                    
                    cell.textContent = value === 0 ? '' : value;
                    cell.className = 'cell';
                    
                    if (value !== 0) {
                        cell.classList.add('given');
                        this.givenCells.add(i);
                    }
                }
                
                this.selectedCell = null;
            }

            async checkGame() {
                if (!this.grid) {
                    this.setMessage('No active game to check', 'error');
                    return;
                }
                
                try {
                    const response = await fetch('/api/validate', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ grid: this.grid })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        this.highlightErrors(data.errors || []);
                        
                        if (data.is_complete) {
                            this.setMessage(data.message, 'success');
                        } else if (data.errors && data.errors.length > 0) {
                            this.setMessage(data.message, 'error');
                        } else {
                            this.setMessage(data.message);
                        }
                    }
                } catch (error) {
                    this.setMessage('Error checking game', 'error');
                }
            }

            highlightErrors(errors) {
                // Clear previous error highlighting
                document.querySelectorAll('.cell.error').forEach(cell => {
                    cell.classList.remove('error');
                });
                
                // Highlight error cells
                errors.forEach(([row, col]) => {
                    const index = row * 9 + col;
                    document.querySelector(`[data-index="${index}"]`).classList.add('error');
                });
            }

            async solveGame() {
                if (!this.grid) {
                    this.setMessage('No active game to solve', 'error');
                    return;
                }
                
                try {
                    const response = await fetch('/api/solve', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        this.grid = data.solution;
                        this.displayGrid();
                        this.setMessage(data.message, 'success');
                    } else {
                        this.setMessage(data.message, 'error');
                    }
                } catch (error) {
                    this.setMessage('Error solving game', 'error');
                }
            }

            setMessage(message, type = '') {
                const messageEl = document.getElementById('statusMessage');
                messageEl.textContent = message;
                messageEl.className = `status-message ${type}`;
            }
        }

        // Initialize the game when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new SudokuUI();
        });
    </script>
</body>
</html>
